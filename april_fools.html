<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BREAKING NEWS</title>
  <style>
    body {
      background-color: #ff0000;
      font-family: Impact, Arial Black, sans-serif;
      text-align: center;
      padding: 20px;
      margin: 0;
    }
    h1 {
      color: yellow;
      font-size: 48px;
      text-shadow: 3px 3px black;
      animation: shake 0.5s infinite;
    }
    .msg {
      font-size: 22px;
      font-weight: bold;
      color: white;
      text-shadow: 2px 2px black;
      margin: 6px 0;
    }
    .msg:nth-child(odd) { color: yellow; }
    .msg:nth-child(even) { color: white; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    footer {
      margin-top: 40px;
      color: white;
      font-size: 28px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>🚨 BREAKING NEWS 🚨</h1>
  <div id="messages"></div>
  <footer>APRIL FOOLS! Coach Hoang is the GOAT!</footer>

  <script>
    const phrases = [
      "Coach Thomas Hoang is a FRAUD!",
      "WARNING: Coach Thomas Hoang cannot be trusted!",
      "EXPOSE: Coach Thomas Hoang has been lying to us ALL!",
      "ALERT: Coach Thomas Hoang is NOT what he seems!",
      "SHOCKING: Coach Thomas Hoang is a certified con artist!",
      "BREAKING: Coach Thomas Hoang fooled everyone!",
      "SCANDAL: Coach Thomas Hoang is a TOTAL phony!",
      "REPORT: Coach Thomas Hoang has been playing us!",
      "NOTICE: Coach Thomas Hoang is 100% a fraud!",
      "CONFIRMED: Coach Thomas Hoang is an imposter!",
    ];

    const container = document.getElementById("messages");
    for (let i = 0; i < 105; i++) {
      const div = document.createElement("div");
      div.className = "msg";
      div.textContent = phrases[i % phrases.length];
      container.appendChild(div);
    }
  </script>
</body>
</html>
